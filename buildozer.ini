[app]

# (str) عنوان التطبيق
title = مدير المهام

# (str) اسم الحزمة (يُستخدم داخل الكود)
package.name = taskmanager

# (str) نطاق الحزمة (استخدم اسمك أو مؤسستك، بدون مسافات)
package.domain = org.yourname

# (list) المتطلبات - أضف كل مكتباتك هنا
requirements = python3,kivy==2.1.0,kivymd==1.1.1,sqlite3

# (str) إصدار التطبيق
version = 1.0

# (str) اتجاه الشاشة (portrait or landscape)
orientation = portrait

# (bool) وضع ملء الشاشة
fullscreen = 0

# (list) الصلاحيات المطلوبة
android.permissions = INTERNET, WRITE_EXTERNAL_STORAGE

# (int) نسخة Android SDK المستهدفة
android.api = 31

# (int) الحد الأدنى لإصدار Android المدعوم
android.minapi = 21

# (str) نسخة Android NDK
android.ndk = 23b

# (str) تنسيق الخرج (apk أو aab)
android.archs = arm64-v8a, armeabi-v7a